[credentials]
# IMPORTANT: Never commit real credentials.
# Copy this file to config.local.ini with your real values,
# or set environment variables LINKEDIN_EMAIL and LINKEDIN_PASSWORD.
linkedin_email    = YOUR_LINKEDIN_EMAIL@example.com
linkedin_password = YOUR_LINKEDIN_PASSWORD

[env]
# Set active_env to: dev | qa | prod
active_env    = dev
base_url_dev  = https://www.linkedin.com/
base_url_qa   = https://www.linkedin.com/
base_url_prod = https://www.linkedin.com/

[timeouts]
implicit_wait      = 10
explicit_wait      = 20
page_load_timeout  = 60
